services:

  mysql:
    image: mysql:8.0
    container_name: licenta_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: licenta_db
      MYSQL_USER: licenta_user
      MYSQL_PASSWORD: licenta_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "licenta_user", "-plicenta_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: licenta_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Suprascrie DB_URL din .env: in Docker, hostname-ul este "mysql" (numele serviciului)
      DB_URL: mysql+pymysql://licenta_user:licenta_pass@mysql:3306/licenta_db
      JWT_SECRET: smart_planner_local_dev_secret_2026_change_in_production_7f4b2c9a
      JWT_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: http://localhost:5173,http://localhost,http://127.0.0.1
      NOTIFICATION_WORKER_ENABLED: "true"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: licenta_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  backend_uploads:
